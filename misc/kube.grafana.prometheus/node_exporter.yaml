apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: node-exporter
  name: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      containers:
      - image: prom/node-exporter
        name: node-exporter
---
kind: Service
apiVersion: v1
metadata:
  name: node-exporter
  labels:
    app: node-exporter
spec:
  type: LoadBalancer
  ports:
   - name: http
     port: 9100
  selector:
    app: node-exporter
