---
apiVersion: v1
kind: Service
metadata:
  name: transmission
spec:
  selector:
    app: transmission
  type: NodePort
  ports:
    - name: http
      protocol: TCP
      port: 9091
      targetPort: 9091
      nodePort: 30001
    - name: tcp
      protocol: TCP
      port: 30002
      targetPort: 30002
      nodePort: 30002
    - name: udp
      protocol: UDP
      port: 30002
      targetPort: 30002
      nodePort: 30002
