version: '2'
services:
  web:
    image: ansible/awx:17.1.0
    tmpfs: /var/tmp2
    container_name: awx_web
    depends_on:
      - redis
      - postgres
    ports:
      - "80:8052"
    hostname: awxweb
    user: root
    restart: unless-stopped
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        syslog-facility: "16"
        tag: "awx_web"
    volumes:
#     - supervisor-socket:/var/run/supervisor
#     - rsyslog-socket:/var/run/awx-rsyslog/
#     - rsyslog-config:/var/lib/awx/rsyslog/
      - "./configs/SECRET_KEY:/etc/tower/SECRET_KEY"
      - "./configs/environment.sh:/etc/tower/conf.d/environment.sh"
      - "./configs/credentials.py:/etc/tower/conf.d/credentials.py"
      - "./configs/nginx.conf:/etc/nginx/nginx.conf:ro"
      - "./configs/redis_socket:/var/run/redis/:rw"
      - "./projects:/var/lib/awx/projects:rw"
    environment:
      http_proxy: 
      https_proxy: 
      no_proxy: 
  task:
    image: ansible/awx:17.1.0
    container_name: awx_task
    depends_on:
      - redis
      - web
      - postgres
    command: /usr/bin/launch_awx_task.sh
    hostname: awx
    user: root
    restart: unless-stopped
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        syslog-facility: "16"
        tag: "awx_task"
    volumes:
#     - supervisor-socket:/var/run/supervisor
#     - rsyslog-socket:/var/run/awx-rsyslog/
#     - rsyslog-config:/var/lib/awx/rsyslog/
      - "./configs/SECRET_KEY:/etc/tower/SECRET_KEY"
      - "./configs/environment.sh:/etc/tower/conf.d/environment.sh"
      - "./configs/credentials.py:/etc/tower/conf.d/credentials.py"
      - "./configs/redis_socket:/var/run/redis/:rw"
      - "./task:/var/lib/awx/projects:rw"
    environment:
      AWX_SKIP_MIGRATIONS: "0"
      http_proxy: 
      https_proxy: 
      no_proxy: 
      SUPERVISOR_WEB_CONFIG_PATH: '/etc/supervisord.conf'
  redis:
    image: redis
    container_name: awx_redis
    restart: unless-stopped
    environment:
      http_proxy: 
      https_proxy: 
      no_proxy: 
    command: ["/usr/local/etc/redis/redis.conf"]
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        syslog-facility: "16"
        tag: "redis"
    volumes:
      - "./configs/redis.conf:/usr/local/etc/redis/redis.conf:ro"
      - "./configs/redis_socket:/var/run/redis/:rw"
  postgres:
    image: postgres:12
    container_name: awx_postgres
    restart: unless-stopped
    volumes:
      - "./configs/pg/:/var/lib/postgresql/data:Z"
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        syslog-facility: "16"
        tag: "postgres"
    environment:
      POSTGRES_USER: awx
      POSTGRES_PASSWORD: awxpass
      POSTGRES_DB: awx
      http_proxy: 
      https_proxy: 
      no_proxy: 
# volumes:
#   supervisor-socket:
#   rsyslog-socket:
#   rsyslog-config:
