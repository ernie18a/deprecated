apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-worker1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-redis-worker1
  template:
    metadata:
      labels:
        app: nginx-redis-worker1
    spec:
      containers:
      - name: nginx-redis
        image: quay-server.ocp4.example.com/nginx/redis
      nodeSelector:
        kubernetes.io/hostname: w1.ocp4.example.com
